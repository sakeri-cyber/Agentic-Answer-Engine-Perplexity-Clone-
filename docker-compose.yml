version: "3.8"

services: 

#  1. Dense Vector Engine

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ae_qdrant
    ports:
      - "6333:6333" # REST API (for easy debugging via browser)
      - "6334:6334" # gRPC API (for production use) --> Helping in reducing latency and imporving performance
    volumes:
      - ./data/qdrant_data:/qdrant/storage
    restart: unless-stopped

  #  2. Sparse Lexical Engine

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: ae_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.monitoring.collection.enabled=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - ./data/es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  # 3. The Message Broker & Semantic Cache

  redis:
    image: redis:7-alpine
    container_name: ae_redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped